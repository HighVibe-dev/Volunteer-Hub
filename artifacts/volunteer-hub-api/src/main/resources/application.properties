server.port=${SPRING_PORT:8080}
server.servlet.context-path=/api

spring.application.name=volunteer-hub

# Database — managed by DataSourceConfig.java (converts postgresql:// to jdbc:postgresql://)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# JWT — JWT_SECRET MUST be set in production; a fallback is provided for local/dev only.
# WARNING: always override JWT_SECRET with a secure random 64+ character string in production.
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.nayepankh=INFO
logging.level.org.springframework.security=WARN

# SpringDoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Certificates directory
certificates.output-dir=${CERTIFICATES_DIR:/tmp/certificates}
