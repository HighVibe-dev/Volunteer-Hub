openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NayePankh Volunteer Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: volunteers
    description: Volunteer management
  - name: events
    description: Event management
  - name: applications
    description: Event applications
  - name: attendance
    description: Attendance tracking
  - name: certificates
    description: Certificate management
  - name: notifications
    description: Notification management
  - name: skills
    description: Skills management
  - name: leaderboard
    description: Leaderboard
  - name: dashboard
    description: Dashboard stats
  - name: reports
    description: Reports
  - name: search
    description: Search

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new volunteer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out

  /auth/staff:
    post:
      operationId: createStaff
      tags: [auth]
      summary: Create a staff account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # ── VOLUNTEERS ───────────────────────────────────────────────────────────────
  /volunteers:
    get:
      operationId: listVolunteers
      tags: [volunteers]
      summary: List all volunteers (admin/coordinator)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [ACTIVE, INACTIVE, PENDING] }
        - name: skill
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string }
        - name: sortDir
          in: query
          schema: { type: string, enum: [asc, desc] }
      responses:
        "200":
          description: Page of volunteers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerPage"

  /volunteers/me:
    get:
      operationId: getMyProfile
      tags: [volunteers]
      summary: Get current volunteer's profile
      responses:
        "200":
          description: Volunteer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"
    put:
      operationId: updateMyProfile
      tags: [volunteers]
      summary: Update current volunteer's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"

  /volunteers/{volunteerId}:
    get:
      operationId: getVolunteerById
      tags: [volunteers]
      summary: Get a volunteer by ID
      parameters:
        - name: volunteerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Volunteer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"
        "404":
          description: Not found

  /volunteers/{volunteerId}/activate:
    put:
      operationId: activateVolunteer
      tags: [volunteers]
      summary: Activate a volunteer account
      parameters:
        - name: volunteerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Volunteer activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"

  /volunteers/{volunteerId}/deactivate:
    put:
      operationId: deactivateVolunteer
      tags: [volunteers]
      summary: Deactivate a volunteer account
      parameters:
        - name: volunteerId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Volunteer deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"

  /volunteers/{volunteerId}/skills:
    post:
      operationId: addVolunteerSkill
      tags: [volunteers]
      summary: Add a skill to a volunteer
      parameters:
        - name: volunteerId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerSkillInput"
      responses:
        "200":
          description: Skills updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"

  /volunteers/{volunteerId}/skills/{skillId}:
    delete:
      operationId: removeVolunteerSkill
      tags: [volunteers]
      summary: Remove a skill from a volunteer
      parameters:
        - name: volunteerId
          in: path
          required: true
          schema: { type: integer }
        - name: skillId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Skill removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolunteerProfile"

  # ── EVENTS ───────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string, enum: [UPCOMING, ONGOING, COMPLETED, CANCELLED] }
        - name: search
          in: query
          schema: { type: string }
        - name: upcoming
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Page of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventPage"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted

  /events/{eventId}/requirements:
    post:
      operationId: addEventRequirement
      tags: [events]
      summary: Add skill requirement to event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequirementInput"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}/cancel:
    put:
      operationId: cancelEvent
      tags: [events]
      summary: Cancel an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Cancelled event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  # ── APPLICATIONS ─────────────────────────────────────────────────────────────
  /event-applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications (own or all for admin)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: eventId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED, WITHDRAWN] }
        - name: volunteerId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Page of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationPage"
    post:
      operationId: applyToEvent
      tags: [applications]
      summary: Apply to an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /event-applications/{applicationId}:
    delete:
      operationId: withdrawApplication
      tags: [applications]
      summary: Withdraw an application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Withdrawn

  /event-applications/{applicationId}/status:
    put:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Approve or reject an application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  # ── ATTENDANCE ───────────────────────────────────────────────────────────────
  /attendance/event/{eventId}:
    get:
      operationId: getEventAttendance
      tags: [attendance]
      summary: List attendance records for an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/event/{eventId}/checkin:
    post:
      operationId: checkInVolunteer
      tags: [attendance]
      summary: Check in a volunteer at an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "201":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/{attendanceId}:
    put:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update attendance record (checkout, hours)
      parameters:
        - name: attendanceId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /attendance/me:
    get:
      operationId: getMyAttendance
      tags: [attendance]
      summary: Get current user's attendance history
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Attendance history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendancePage"

  # ── CERTIFICATES ─────────────────────────────────────────────────────────────
  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
      summary: List certificates (own for volunteer, all for admin)
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: volunteerId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Page of certificates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificatePage"

  /certificates/{certificateId}/download:
    get:
      operationId: downloadCertificate
      tags: [certificates]
      summary: Get certificate download URL
      parameters:
        - name: certificateId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateDownload"

  /certificates/generate/event/{eventId}:
    post:
      operationId: generateEventCertificates
      tags: [certificates]
      summary: Generate certificates for all attendees of an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Certificates generated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  # ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: unreadOnly
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Page of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPage"

  /notifications/unread-count:
    get:
      operationId: getUnreadNotificationCount
      tags: [notifications]
      summary: Get count of unread notifications
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /notifications/{notificationId}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All notifications read

  /notifications/{notificationId}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted

  # ── SKILLS ───────────────────────────────────────────────────────────────────
  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: createSkill
      tags: [skills]
      summary: Create a new skill (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  # ── LEADERBOARD ───────────────────────────────────────────────────────────────
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get volunteer leaderboard
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
        - name: period
          in: query
          schema: { type: string, enum: [weekly, monthly, all-time], default: all-time }
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ── DASHBOARD ─────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/trends:
    get:
      operationId: getDashboardTrends
      tags: [dashboard]
      summary: Get monthly trends for charts
      parameters:
        - name: months
          in: query
          schema: { type: integer, default: 6 }
      responses:
        "200":
          description: Monthly trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DashboardTrend"

  # ── REPORTS ───────────────────────────────────────────────────────────────────
  /reports/volunteer-participation:
    get:
      operationId: getVolunteerParticipationReport
      tags: [reports]
      summary: Get volunteer participation report
      parameters:
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 0 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Participation report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipationReportPage"

  /reports/attendance:
    get:
      operationId: getAttendanceReport
      tags: [reports]
      summary: Get attendance report
      parameters:
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
        - name: eventId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceReportEntry"

  /reports/events:
    get:
      operationId: getEventsReport
      tags: [reports]
      summary: Get events report
      parameters:
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Events report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventReportEntry"

  /reports/skill-distribution:
    get:
      operationId: getSkillDistributionReport
      tags: [reports]
      summary: Get skill distribution among volunteers
      responses:
        "200":
          description: Skill distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillDistribution"

  # ── SEARCH ────────────────────────────────────────────────────────────────────
  /search:
    get:
      operationId: globalSearch
      tags: [search]
      summary: Global search across volunteers and events
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string, enum: [all, volunteers, events], default: all }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

components:
  schemas:
    # ── HEALTH ──────────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── AUTH ────────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterInput:
      type: object
      required: [firstName, lastName, email, password, phone]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        phone:
          type: string
        address:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    StaffInput:
      type: object
      required: [firstName, lastName, email, password, role]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [ADMIN, COORDINATOR]

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, userId, email, role, firstName, lastName]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        userId:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, COORDINATOR, VOLUNTEER]
        firstName:
          type: string
        lastName:
          type: string
        expiresIn:
          type: integer

    # ── VOLUNTEERS ──────────────────────────────────────────────────────────────
    VolunteerProfile:
      type: object
      required: [id, firstName, lastName, email, status, role]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        status:
          type: string
